services:
  # 第2章: 自社コーポレートサイト
  frontend-corp:
    # NOTE: 本サイトの実装が完了するまでダミーサイトを表示します
    container_name: corporate-site
    image: dummy:latest
    build:
      context: ./services/dummy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.corp.rule=Host(`localhost`)"
      - "traefik.http.routers.corp.entrypoints=web"
    env_file:
      - ./secrets/.env.common
      - ./secrets/.env.google
      - ./secrets/.env.corporate
    networks:
      - app-network
    restart: always

  # 第3章: ライバー向けランキングサイト
  frontend-rank:
    # NOTE: 本サイトの実装が完了するまでダミーサイトを表示します
    container_name: tiktok-ranking
    image: tiktok-ranking:latest
    extra_hosts:
      - "auth.localhost:host-gateway"
      - "ranking.localhost:host-gateway"
    build:
      context: ./services/tiktok-ranking
    volumes:
      - ./data/:/app/public/data:ro
      - ./secrets/service-account.json:/app/secrets/service-account.json:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rank.rule=Host(`ranking.localhost`)"
      - "traefik.http.routers.rank.entrypoints=web"
    env_file:
      - ./secrets/.env.ranking
    depends_on:
      - keycloak
    networks:
      - app-network
    restart: always

  # 第4.1章: 認証基盤 (Keycloak)
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password # 実際の運用では env_file または secrets を使用
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./services/auth/realms:/opt/keycloak/data/import:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth.rule=Host(`auth.localhost`)"
      - "traefik.http.routers.auth.entrypoints=web"
      - "traefik.http.services.auth.loadbalancer.server.port=8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - app-network
    restart: always

  # Keycloak 用データベース
  keycloak-db:
    container_name: keycloak-db
    image: postgres:16.4-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 第4章: データ抽出 Worker
  worker-fetcher:
    container_name: data-fetcher
    image: data-fetcher:latest
    profiles: ["task"]
    build:
      context: ./services/data-fetcher/data-fetcher
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./secrets/service-account.json:/app/secrets/service-account.json:ro
    env_file:
      - ./secrets/.env.common
      - ./secrets/.env.google
      - ./secrets/.env.fetcher
    networks:
      - app-network

networks:
  app-network:
    external: true

volumes:
  data-creators:
  keycloak-db-data: