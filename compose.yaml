services:
  # 第1章 1.1 & 1.2: Nginx によるリバースプロキシ
  reverse-proxy:
    container_name: reverse-proxy
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - frontend-corp
      - frontend-rank
      - keycloak
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    restart: always

  # 第2章: 自社コーポレートサイト
  frontend-corp:
    # NOTE: 本サイトの実装が完了するまでダミーサイトを表示します
    container_name: corporate-site
    image: dummy:latest
    build:
      context: ./services/dummy
    env_file:
      - ./secrets/.env.common
      - ./secrets/.env.google
      - ./secrets/.env.corporate
    networks:
      - app-network
    restart: always

  # 第3章: ライバー向けランキングサイト
  frontend-rank:
    # NOTE: 本サイトの実装が完了するまでダミーサイトを表示します
    container_name: tiktok-ranking
    image: tiktok-ranking:latest
    extra_hosts:
      - "auth.localhost:host-gateway"
      - "ranking.localhost:host-gateway"
    build:
      context: ./services/tiktok-ranking
    volumes:
      - ./data/:/app/public/data:ro
      - ./secrets/service-account.json:/app/secrets/service-account.json:ro
    env_file:
      - ./secrets/.env.ranking
    depends_on:
      - keycloak
    networks:
      - app-network
    restart: always

  # 第4.1章: 認証基盤 (Keycloak)
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password # 実際の運用では env_file または secrets を使用
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./services/auth/realms:/opt/keycloak/data/import:ro
    depends_on:
      - keycloak-db
    networks:
      - app-network
    restart: always

  # Keycloak 用データベース
  keycloak-db:
    container_name: keycloak-db
    image: postgres:16.4-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: always

  # 第4章: データ抽出 Worker
  worker-fetcher:
    container_name: data-fetcher
    image: data-fetcher:latest
    profiles: ["task"]
    build:
      context: ./services/data-fetcher/data-fetcher
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./secrets/service-account.json:/app/secrets/service-account.json:ro
    env_file:
      - ./secrets/.env.common
      - ./secrets/.env.google
      - ./secrets/.env.fetcher
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  data-creators:
  keycloak-db-data: